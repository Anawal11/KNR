<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>A Question For You...</title>
  
  <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
  
  <style>
    body {
      font-family: sans-serif;
      text-align: center;
      background-color: #ffe6e6;
      margin-top: 50px;
      /* overflow: hidden; -> REMOVED so you can actually scroll! */
    }
    .media-container {
      margin: 20px auto;
      max-width: 600px;
      padding-bottom: 50px;
    }
    .media-item {
      /* Added a huge margin so the items are spaced out and require scrolling */
      margin-bottom: 60vh; 
    }
    img, video {
      max-width: 100%;
      border-radius: 10px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
    }
    .btn {
      padding: 15px 30px;
      font-size: 20px;
      cursor: pointer;
      border: none;
      border-radius: 5px;
      margin: 10px;
    }
    #btn-yes {
      background-color: #4CAF50;
      color: white;
    }
    #btn-no {
      background-color: #f44336;
      color: white;
      position: relative;
      z-index: 100;
    }
    .proposal-section {
      margin-bottom: 150px;
    }
  </style>
</head>
<body>

  <h1 data-aos="fade-down">You make me so happy.</h1>

  <div class="media-container">
    <div class="media-item" data-aos="zoom-in">
      <img src="your-pic.jpg" alt="Us">
    </div>

    <div class="media-item" data-aos="fade-up">
      <video controls src="your-vid.mp4"></video>
    </div>

    <div class="media-item" data-aos="fade-in">
      <h2>Text here</h2>
    </div>
  </div>

  <div class="proposal-section" data-aos="fade-up">
    <h2>Will you be my girlfriend?</h2>
    <button class="btn" id="btn-yes" onclick="alert('Yay! ❤️')">Yes</button>
    <button class="btn" id="btn-no" onmouseover="moveButton()">No</button>
  </div>

  <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
  <script>
    // Initialize the scroll animations
    AOS.init({ duration: 1000 });

    // The runaway button script
    function moveButton() {
      const btn = document.getElementById("btn-no");
      const x = Math.random() * (window.innerWidth - btn.offsetWidth);
      const y = Math.random() * (window.innerHeight - btn.offsetHeight);
      
      // Changed to 'fixed' so it doesn't get lost on a scrolling page
      btn.style.position = "fixed"; 
      btn.style.left = `${x}px`;
      btn.style.top = `${y}px`;
    }
  </script>
</body>
</html>
